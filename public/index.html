<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pulse</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F493;</text></svg>">
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #141419;
    --panel-2: #101014;
    --border: #26262e;
    --grid: #232329;
    --baseline: #34343c;
    --accent: #e8283f;          /* chrome/brand only — never a data series */
    --ink: #f2f2f5;
    --ink-2: #a9a9b3;
    --muted: #6d6d78;
    --cpu: #3987e5;
    --mem: #9085e9;
    --gpu: #d55181;
    --vram: #d95926;
    --down: #199e70;
    --up: #c98500;
    --good: #0ca30c;
    --warn: #fab219;
    --crit: #d03b3b;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 13.5px;
    overflow: hidden;
  }
  #shell { display: flex; height: 100vh; }

  /* ---------- nav rail ---------- */
  #rail {
    width: 198px; flex: none; display: flex; flex-direction: column;
    background:
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 6px),
      var(--panel-2);
    border-right: 1px solid var(--border);
  }
  #logo { padding: 20px 18px 10px; }
  #logo .word { font-size: 21px; font-weight: 800; letter-spacing: 5px; }
  #logo .word i { color: var(--accent); font-style: normal; }
  #ekg { display: block; margin-top: 6px; }
  #ekg polyline {
    fill: none; stroke: var(--accent); stroke-width: 2; stroke-linejoin: round;
    stroke-dasharray: 130 190; animation: ekg 2.6s linear infinite;
    filter: drop-shadow(0 0 3px rgba(232,40,63,.7));
  }
  @keyframes ekg { from { stroke-dashoffset: 320; } to { stroke-dashoffset: 0; } }

  #nav { margin-top: 14px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 18px; cursor: pointer; color: var(--ink-2);
    font-size: 11.5px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase;
    border-left: 3px solid transparent; transition: color .15s, background .15s, border-color .15s;
    user-select: none;
  }
  .nav-item .glyph { width: 17px; text-align: center; font-size: 13px; opacity: .8; }
  .nav-item:hover { color: var(--ink); background: rgba(255,255,255,0.03); }
  .nav-item.active {
    color: var(--ink); border-left-color: var(--accent);
    background: linear-gradient(90deg, rgba(232,40,63,0.12), transparent 70%);
  }
  #rail-foot { padding: 14px 18px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); line-height: 1.7; }
  #rail-foot b { color: var(--ink-2); font-weight: 600; }

  /* ---------- main column ---------- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #topbar {
    display: flex; align-items: center; gap: 18px;
    padding: 14px 22px; border-bottom: 1px solid var(--border);
    background:
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 6px),
      var(--panel-2);
  }
  #page-title { font-size: 17px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }
  #page-title::before { content: "// "; color: var(--accent); font-weight: 800; }
  #topbar .spacer { flex: 1; }
  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 4px 12px; border: 1px solid var(--border); border-radius: 3px;
    font-size: 11.5px; color: var(--ink-2); font-variant-numeric: tabular-nums;
    background: var(--panel);
  }
  .chip b { color: var(--ink); font-weight: 700; }
  #live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--crit); flex: none; }
  #live-dot.on { background: var(--good); animation: pulse 2s ease-out infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(12,163,12,.55); } 70% { box-shadow: 0 0 0 7px rgba(12,163,12,0); } 100% { box-shadow: 0 0 0 0 rgba(12,163,12,0); } }

  #page { flex: 1; overflow-y: auto; padding: 18px 22px 26px; }
  .page-enter { animation: rise .22s ease-out; }
  @keyframes rise { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: none; } }

  /* ---------- panels ---------- */
  .grid { display: grid; gap: 14px; }
  .panel {
    position: relative; background: var(--panel); border: 1px solid var(--border);
    padding: 14px 16px; min-width: 0;
    clip-path: polygon(0 0, calc(100% - 13px) 0, 100% 13px, 100% 100%, 13px 100%, 0 calc(100% - 13px));
  }
  .panel::before {
    content: ""; position: absolute; top: 0; left: 0; width: 34px; height: 2px; background: var(--accent);
  }
  .panel h2 {
    font-size: 10.5px; font-weight: 700; letter-spacing: 2.2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: baseline;
  }
  .panel h2 .aside { letter-spacing: .5px; font-weight: 400; text-transform: none; color: var(--muted); }

  /* stat blocks */
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 14px; }
  .stat-row.c3 { grid-template-columns: repeat(3, 1fr); }
  .stat { position: relative; }
  .stat .val { font-size: 33px; font-weight: 800; line-height: 1.05; font-variant-numeric: tabular-nums; letter-spacing: -.5px; }
  .stat .val small { font-size: 14px; font-weight: 600; color: var(--muted); letter-spacing: 0; }
  .stat .sub { color: var(--muted); font-size: 11.5px; margin-top: 4px; font-variant-numeric: tabular-nums; }

  /* charts */
  .chart { position: relative; cursor: crosshair; }
  .chart svg { display: block; width: 100%; height: 100%; overflow: visible; }
  .legend { display: flex; gap: 16px; font-size: 11.5px; color: var(--ink-2); flex-wrap: wrap; }
  .legend .dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 6px; vertical-align: -1px; }
  .legend .lv { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; margin-left: 5px; }

  #tooltip {
    position: fixed; pointer-events: none; z-index: 40; display: none;
    background: #0c0c0f; border: 1px solid var(--baseline); padding: 8px 11px;
    font-size: 11.5px; color: var(--ink-2); white-space: nowrap; font-variant-numeric: tabular-nums;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
  }
  #tooltip .tt-time { color: var(--muted); font-size: 10.5px; letter-spacing: 1px; margin-bottom: 4px; }
  #tooltip .tt-row { display: flex; align-items: center; gap: 7px; padding: 1px 0; }
  #tooltip .tt-row b { color: var(--ink); margin-left: auto; padding-left: 14px; }
  #tooltip .dot { width: 8px; height: 8px; border-radius: 2px; flex: none; }

  /* bars & tables */
  .track { height: 9px; background: var(--grid); overflow: hidden; }
  .track .fill { height: 100%; background: var(--cpu); transition: width .6s ease; }
  .vol { margin-bottom: 12px; }
  .vol:last-child { margin-bottom: 0; }
  .vol .row { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 5px; font-variant-numeric: tabular-nums; }
  .vol .row .free { color: var(--ink-2); }

  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th, td { text-align: left; padding: 6px 10px; font-size: 12.5px; }
  th { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1.6px; border-bottom: 1px solid var(--baseline); user-select: none; }
  th.sortable { cursor: pointer; } th.sortable:hover { color: var(--ink); }
  th.num, td.num { text-align: right; }
  tbody tr { border-bottom: 1px solid var(--grid); }
  tbody tr:hover { background: rgba(255,255,255,0.035); }
  td .pid { color: var(--muted); font-size: 11px; margin-left: 4px; }
  .mini-track { height: 5px; background: var(--grid); overflow: hidden; }
  .mini-fill { height: 100%; background: var(--cpu); transition: width .4s; }
  .bar-cell { width: 120px; }

  .kill {
    background: none; border: 1px solid var(--baseline); color: var(--muted);
    padding: 2px 10px; cursor: pointer; font-size: 11.5px; letter-spacing: 1px;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
    transition: color .15s, border-color .15s;
  }
  .kill:hover { border-color: var(--crit); color: var(--crit); }
  .kill.confirm { background: var(--crit); border-color: var(--crit); color: #fff; }

  input[type=search] {
    background: var(--panel-2); color: var(--ink); border: 1px solid var(--baseline);
    padding: 6px 11px; font-size: 12.5px; width: 230px; outline: none;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
  }
  input[type=search]:focus { border-color: var(--muted); }

  /* key-value spec rows */
  .kv { display: flex; justify-content: space-between; gap: 14px; padding: 6px 0; border-bottom: 1px solid var(--grid); font-size: 12.5px; }
  .kv:last-child { border-bottom: 0; }
  .kv .k { color: var(--muted); flex: none; }
  .kv .v { color: var(--ink-2); text-align: right; overflow-wrap: anywhere; font-variant-numeric: tabular-nums; }
  .kv .v b { color: var(--ink); }

  .core-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 7px; }
  .core-cell { background: var(--panel-2); padding: 7px 8px; font-size: 10.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .core-cell b { display: block; color: var(--ink-2); font-size: 11.5px; font-weight: 700; }
  .core-cell .mini-track { margin-top: 5px; }

  .checks { list-style: none; }
  .checks li { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--grid); align-items: baseline; font-size: 12.5px; }
  .checks li:last-child { border-bottom: 0; }
  .checks .icon { width: 15px; flex: none; text-align: center; font-weight: 800; font-size: 11.5px; }
  .checks .name { color: var(--ink); font-weight: 600; min-width: 150px; }
  .checks .detail { color: var(--ink-2); }
  .status-good { color: var(--good); } .status-warn { color: var(--warn); } .status-crit { color: var(--crit); }

  .ring { position: relative; width: 104px; height: 104px; flex: none; }
  .ring svg { transform: rotate(-90deg); }
  .ring .val { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring .val b { font-size: 26px; font-weight: 800; }
  .ring .val span { font-size: 9.5px; color: var(--muted); letter-spacing: 1.5px; }

  .hint { font-size: 12px; color: var(--warn); line-height: 1.5; margin-bottom: 10px; }
  .note { font-size: 11.5px; color: var(--muted); line-height: 1.5; }

  /* toast notifications */
  #toasts { position: fixed; right: 18px; bottom: 18px; z-index: 50; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    background: #0c0c0f; border: 1px solid var(--baseline); border-left: 3px solid var(--warn);
    padding: 12px 15px; max-width: 380px; font-size: 12.5px; color: var(--ink-2); line-height: 1.5;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    animation: rise .2s ease-out;
  }
  .toast b { color: var(--ink); }
  .toast .actions { margin-top: 9px; display: flex; gap: 10px; }
  .toast button {
    background: var(--accent); border: 0; color: #fff; padding: 5px 13px; cursor: pointer;
    font-size: 11.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
  }
  .toast button.ghost { background: none; border: 1px solid var(--baseline); color: var(--muted); }
  #rail-foot .elevate { cursor: pointer; }
  #rail-foot .elevate:hover { color: var(--warn); text-decoration: underline; }

  /* HUD buttons & dashboard editing */
  .hud-btn {
    background: var(--accent); border: 0; color: #fff; padding: 6px 14px; cursor: pointer;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    clip-path: polygon(0 0, calc(100% - 7px) 0, 100% 7px, 100% 100%, 7px 100%, 0 calc(100% - 7px));
  }
  .hud-btn.ghost { background: var(--panel); border: 1px solid var(--baseline); color: var(--ink-2); }
  .hud-btn:hover { filter: brightness(1.15); }
  .wctl { display: inline-flex; gap: 4px; }
  .wctl button {
    background: var(--panel-2); border: 1px solid var(--baseline); color: var(--muted);
    width: 22px; height: 20px; cursor: pointer; font-size: 10px; padding: 0;
  }
  .wctl button:hover { color: var(--ink); border-color: var(--muted); }
  .wctl button.x:hover { color: var(--crit); border-color: var(--crit); }
  select {
    background: var(--panel-2); color: var(--ink); border: 1px solid var(--baseline);
    padding: 6px 9px; font-size: 12px; outline: none; max-width: 320px;
  }

  /* sensors page */
  .sn-cat { margin-bottom: 4px; }
  .sn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; margin: 8px 0 16px; }
  .sn-tile {
    background: var(--panel-2); border: 1px solid var(--grid); padding: 9px 11px; position: relative;
    clip-path: polygon(0 0, calc(100% - 9px) 0, 100% 9px, 100% 100%, 0 100%);
  }
  .sn-tile .sn-name { font-size: 11px; color: var(--muted); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sn-tile b { font-size: 17px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .sn-tile .pin {
    position: absolute; top: 6px; right: 6px; opacity: 0; transition: opacity .15s;
    background: none; border: 1px solid var(--baseline); color: var(--muted); font-size: 10px; padding: 1px 6px; cursor: pointer;
  }
  .sn-tile:hover .pin { opacity: 1; }
  .sn-tile .pin:hover { color: var(--good); border-color: var(--good); }
  .guide-steps { list-style: none; counter-reset: step; margin: 12px 0; }
  .guide-steps li { counter-increment: step; display: flex; gap: 12px; padding: 8px 0; font-size: 13px; color: var(--ink-2); align-items: baseline; }
  .guide-steps li::before {
    content: counter(step); flex: none; width: 22px; height: 22px; background: var(--accent); color: #fff;
    font-weight: 800; font-size: 12px; display: inline-flex; align-items: center; justify-content: center;
    clip-path: polygon(0 0, calc(100% - 5px) 0, 100% 5px, 100% 100%, 5px 100%, 0 calc(100% - 5px));
  }
  .guide-steps a { color: var(--cpu); }

  @media (max-width: 1150px) {
    .stat-row { grid-template-columns: repeat(2, 1fr); }
    .core-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>
<div id="shell">
  <nav id="rail">
    <div id="logo">
      <div class="word">PULSE<i>_</i></div>
      <svg id="ekg" width="160" height="26" viewBox="0 0 160 26">
        <polyline points="0,16 38,16 48,16 56,5 64,22 72,16 96,16 104,12 112,16 160,16"/>
      </svg>
    </div>
    <div id="nav"></div>
    <div id="rail-foot">loading…</div>
  </nav>
  <div id="main">
    <div id="topbar">
      <div id="page-title">Overview</div>
      <div class="spacer"></div>
      <span class="chip" id="health-chip" style="cursor:pointer" title="Health score — see Overview">HEALTH <b>–</b></span>
      <span class="chip" id="uptime-chip">UP <b>–</b></span>
      <span class="chip"><span id="live-dot"></span><span id="live-label">offline</span></span>
    </div>
    <div id="page"></div>
  </div>
</div>
<div id="tooltip"></div>
<div id="toasts"></div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const dash = v => v == null || v === '' ? '—' : v;
const fmtBytes = b => b >= 1e9 ? (b / 1e9).toFixed(1) + ' GB' : b >= 1e6 ? (b / 1e6).toFixed(0) + ' MB' : (b / 1e3).toFixed(0) + ' KB';
const fmtRate = b => b >= 1e6 ? (b / 1e6).toFixed(1) + ' MB/s' : (b / 1e3).toFixed(0) + ' KB/s';
const fmtUp = s => { const d = Math.floor(s / 86400), h = Math.floor(s % 86400 / 3600), m = Math.floor(s % 3600 / 60); return (d ? d + 'd ' : '') + h + 'h ' + m + 'm'; };
const fmtClock = t => new Date(t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

/* ---------- animated number ---------- */
function tween(el, val, fmt) {
  if (el == null || val == null || !isFinite(val)) return;
  if (el._tv === undefined) { el._tv = val; el.textContent = fmt(val); return; }
  const from = el._tv, to = val, t0 = performance.now();
  if (el._raf) cancelAnimationFrame(el._raf);
  const step = now => {
    const p = Math.min(1, (now - t0) / 320), e = 1 - Math.pow(1 - p, 3);
    el._tv = from + (to - from) * e;
    el.textContent = fmt(el._tv);
    if (p < 1) el._raf = requestAnimationFrame(step);
  };
  el._raf = requestAnimationFrame(step);
}

/* ---------- tooltip ---------- */
const tooltip = $('tooltip');
function showTooltip(x, y, html) {
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  const r = tooltip.getBoundingClientRect();
  tooltip.style.left = Math.min(x + 16, innerWidth - r.width - 10) + 'px';
  tooltip.style.top = Math.max(8, y - r.height - 12) + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

/* ---------- toasts & elevation ---------- */
function showToast(html, action) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = html + (action ? `<div class="actions"><button class="act"></button><button class="ghost">dismiss</button></div>` : '');
  if (action) {
    t.querySelector('.act').textContent = action.label;
    t.querySelector('.act').addEventListener('click', () => { action.onClick(); t.remove(); });
    t.querySelector('.ghost').addEventListener('click', () => t.remove());
  }
  $('toasts').appendChild(t);
  setTimeout(() => t.remove(), action ? 15000 : 6000);
}
function relaunchElevated() {
  fetch('/api/relaunch-elevated', { method: 'POST' }).then(r => r.json()).then(d => {
    if (d.ok) showToast('<b>Restarting as administrator…</b><br>Approve the Windows prompt that appears. Pulse will reopen elevated in a few seconds.');
    else showToast(esc(d.message || d.error || 'Could not relaunch.'));
  }).catch(() => showToast('Could not reach Pulse to relaunch.'));
}
function offerElevation(reason) {
  showToast(`<b>Administrator needed</b><br>${reason}`, { label: 'Restart as admin', onClick: relaunchElevated });
}

/* ---------- time chart: 30-min window, scrubbing, bands, gradient fills ---------- */
class TimeChart {
  // opts: { series: [{key,label,color,fill}], yMax, yFmt, spanMs, bands: [{from,to,color}], legendEl }
  constructor(el, opts) {
    this.el = el; this.o = Object.assign({ spanMs: 30 * 60000, yFmt: v => v.toFixed(0) }, opts);
    this.d = { t: [] };
    for (const s of this.o.series) this.d[s.key] = [];
    this.svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    el.appendChild(this.svg);
    this.hover = null;
    el.addEventListener('mousemove', e => this.onMove(e));
    el.addEventListener('mouseleave', () => { this.hover = null; hideTooltip(); this.render(); });
    this.uid = 'g' + Math.random().toString(36).slice(2, 8);
  }
  setData(cols) {
    this.d.t = (cols.t || []).slice();
    for (const s of this.o.series) this.d[s.key] = (cols[s.key] || []).slice();
    this.render();
  }
  append(point) {
    this.d.t.push(point.t);
    for (const s of this.o.series) this.d[s.key].push(point[s.key] ?? null);
    const cutoff = Date.now() - this.o.spanMs - 10000;
    while (this.d.t.length && this.d.t[0] < cutoff) {
      this.d.t.shift();
      for (const s of this.o.series) this.d[s.key].shift();
    }
    this.render();
  }
  yMax() {
    if (this.o.yMax) return this.o.yMax;
    let m = 1;
    for (const s of this.o.series) for (const v of this.d[s.key]) if (v != null && v > m) m = v;
    return m * 1.18;
  }
  render() {
    const w = this.el.clientWidth, h = this.el.clientHeight;
    if (!w || !h) return;
    this.svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    const now = Date.now(), span = this.o.spanMs, max = this.yMax();
    const padB = 17, plotH = h - padB;
    const x = t => w - ((now - t) / span) * w;
    const y = v => plotH - (v / max) * (plotH - 6);
    let out = '<defs>';
    for (const s of this.o.series) {
      out += `<linearGradient id="${this.uid}-${s.key}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${s.color}" stop-opacity="0.28"/>
        <stop offset="1" stop-color="${s.color}" stop-opacity="0.02"/></linearGradient>`;
    }
    out += '</defs>';
    // threshold bands
    for (const b of this.o.bands || []) {
      const top = y(Math.min(b.to ?? max, max)), bot = y(Math.max(b.from, 0));
      if (bot > top) out += `<rect x="0" y="${top}" width="${w}" height="${bot - top}" fill="${b.color}" opacity="0.10"/>`;
    }
    // gridlines + y labels (fixed-max charts label the real scale; auto charts label the data peak)
    const yBase = this.o.yMax ? max : max / 1.18;
    for (const f of [0.5, 1]) {
      const gy = y(yBase * f);
      out += `<line x1="0" y1="${gy}" x2="${w}" y2="${gy}" stroke="var(--grid)" stroke-width="1"/>
              <text x="4" y="${gy + 10}" font-size="9.5" fill="var(--muted)">${this.o.yFmt(yBase * f)}</text>`;
    }
    out += `<line x1="0" y1="${plotH}" x2="${w}" y2="${plotH}" stroke="var(--baseline)" stroke-width="1"/>`;
    // x labels
    for (const m of [30, 20, 10, 0]) {
      const tx = x(now - m * 60000);
      out += `<text x="${m === 0 ? tx - 26 : tx + 3}" y="${h - 4}" font-size="9.5" fill="var(--muted)">${m === 0 ? 'now' : '-' + m + 'm'}</text>`;
      if (m) out += `<line x1="${tx}" y1="${plotH}" x2="${tx}" y2="${plotH - 4}" stroke="var(--baseline)" stroke-width="1"/>`;
    }
    // series (decimated, gaps on null)
    const n = this.d.t.length;
    const stride = Math.max(1, Math.floor(n / 340));
    for (const s of this.o.series) {
      const vals = this.d[s.key];
      let segs = [], seg = [];
      for (let i = 0; i < n; i += stride) {
        // take the max inside the stride window so spikes survive decimation
        let v = null;
        for (let j = i; j < Math.min(i + stride, n); j++) if (vals[j] != null && (v == null || vals[j] > v)) v = vals[j];
        if (v == null) { if (seg.length > 1) segs.push(seg); seg = []; continue; }
        seg.push(`${x(this.d.t[i]).toFixed(1)},${y(v).toFixed(1)}`);
      }
      if (seg.length > 1) segs.push(seg);
      for (const sg of segs) {
        if (s.fill !== false) {
          const first = sg[0].split(',')[0], last = sg[sg.length - 1].split(',')[0];
          out += `<polygon points="${first},${plotH} ${sg.join(' ')} ${last},${plotH}" fill="url(#${this.uid}-${s.key})"/>`;
        }
        out += `<polyline points="${sg.join(' ')}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round"/>`;
      }
      // direct label at line end
      const lastIdx = (() => { for (let i = n - 1; i >= 0; i--) if (vals[i] != null) return i; return -1; })();
      if (lastIdx >= 0 && this.o.series.length > 1) {
        out += `<text x="${Math.min(x(this.d.t[lastIdx]) + 5, w - 30)}" y="${y(vals[lastIdx]) + 3.5}" font-size="10" fill="var(--ink-2)">${esc(s.label)}</text>`;
      }
    }
    // hover crosshair
    if (this.hover != null && n) {
      const i = this.hover, hx = x(this.d.t[i]);
      out += `<line x1="${hx}" y1="0" x2="${hx}" y2="${plotH}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>`;
      for (const s of this.o.series) {
        const v = this.d[s.key][i];
        if (v != null) out += `<circle cx="${hx}" cy="${y(v)}" r="3.5" fill="${s.color}" stroke="var(--panel)" stroke-width="2"/>`;
      }
    }
    this.svg.innerHTML = out;
    if (this.o.legendEl) {
      this.o.legendEl.innerHTML = this.o.series.map(s => {
        const vals = this.d[s.key];
        let last = null;
        for (let i = vals.length - 1; i >= 0; i--) if (vals[i] != null) { last = vals[i]; break; }
        return `<span><span class="dot" style="background:${s.color}"></span>${esc(s.label)}<span class="lv">${last == null ? '—' : this.o.yFmt(last)}</span></span>`;
      }).join('');
    }
  }
  onMove(e) {
    const n = this.d.t.length;
    if (!n) return;
    const r = this.el.getBoundingClientRect();
    const now = Date.now(), tAt = now - (1 - (e.clientX - r.left) / r.width) * this.o.spanMs;
    let best = 0, bd = Infinity;
    for (let i = 0; i < n; i++) { const d = Math.abs(this.d.t[i] - tAt); if (d < bd) { bd = d; best = i; } }
    this.hover = best;
    this.render();
    const rows = this.o.series.map(s => {
      const v = this.d[s.key][best];
      return `<div class="tt-row"><span class="dot" style="background:${s.color}"></span>${esc(s.label)}<b>${v == null ? '—' : this.o.yFmt(v)}</b></div>`;
    }).join('');
    showTooltip(e.clientX, e.clientY, `<div class="tt-time">${fmtClock(this.d.t[best])}</div>${rows}`);
  }
}

/* ---------- page framework ---------- */
const PAGES = [
  { id: 'dashboard', label: 'Dashboard', glyph: '⌂' },
  { id: 'overview',  label: 'Overview',  glyph: '◈' },
  { id: 'cpu',       label: 'CPU',       glyph: '▣' },
  { id: 'gpu',       label: 'GPU',       glyph: '◇' },
  { id: 'memory',    label: 'Memory',    glyph: '▤' },
  { id: 'storage',   label: 'Storage',   glyph: '◫' },
  { id: 'network',   label: 'Network',   glyph: '⇅' },
  { id: 'sensors',   label: 'Sensors',   glyph: '≈' },
  { id: 'processes', label: 'Processes', glyph: '≣' },
];
$('nav').innerHTML = PAGES.map(p =>
  `<div class="nav-item" data-page="${p.id}"><span class="glyph">${p.glyph}</span>${p.label}</div>`).join('');
$('nav').addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (item) location.hash = '#/' + item.dataset.page;
});

let current = { id: null, cleanup: [] };
function onCleanup(fn) { current.cleanup.push(fn); }
function every(ms, fn) { fn(); const id = setInterval(fn, ms); onCleanup(() => clearInterval(id)); }
function onBus(ev, fn) { bus.addEventListener(ev, fn); onCleanup(() => bus.removeEventListener(ev, fn)); }

function renderPage() {
  const id = (location.hash.replace('#/', '') || 'dashboard');
  const page = pages[id] ? id : 'dashboard';
  for (const fn of current.cleanup) { try { fn(); } catch {} }
  current = { id: page, cleanup: [] };
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  $('page-title').textContent = PAGES.find(p => p.id === page).label;
  const el = $('page');
  el.innerHTML = `<div class="page-enter">${pages[page].html()}</div>`;
  pages[page].mount();
  el.scrollTop = 0;
}
window.addEventListener('hashchange', renderPage);
window.addEventListener('resize', () => { if (current.charts) for (const c of current.charts) c.render(); });
function regChart(c) { (current.charts = current.charts || []).push(c); return c; }

const statBlock = (id, label) => `<div class="panel stat"><h2>${label}</h2><div class="val" id="${id}"></div><div class="sub" id="${id}-sub"></div></div>`;
const chartPanel = (id, title, height, aside) =>
  `<div class="panel"><h2>${title}${aside ? `<span class="aside">${aside}</span>` : ''}</h2>
   <div class="legend" id="${id}-legend" style="margin-bottom:8px"></div>
   <div class="chart" id="${id}" style="height:${height}px"></div></div>`;

      $('ov-net').innerHTML = `<span style="color:var(--down)">↓</span> ${fmtRate(d.net.rx)}`;
      $('ov-net-sub').innerHTML = `↑ ${fmtRate(d.net.tx)} up`;
    });
    onBus('gpu', e => {

      tween($('ov-gpu'), g['utilization.gpu'], v => v.toFixed(0) + '%');

    const renderHealth = h => {
      if (!h) return;
      const color = h.score >= 90 ? 'var(--good)' : h.score >= 70 ? 'var(--warn)' : 'var(--crit)';
      $('ov-ring').style.stroke = color;
      $('ov-ring').style.strokeDashoffset = 276.5 - (h.score / 100) * 276.5;
      $('ov-score').textContent = h.score;
      const icon = { pass: ['✓', 'status-good'], warn: ['!', 'status-warn'], fail: ['✕', 'status-crit'] };
      const bad = h.checks.filter(c => c.status !== 'pass');
      $('ov-checks').innerHTML = (bad.length ? bad : [{ status: 'pass', name: `All ${h.checks.length} checks passed`, detail: '' }])

    };
    renderHealth(healthData);
    onBus('health', e => renderHealth(e.detail));
    const renderDisks = disks => {
      if (!disks) return;
      $('ov-disks').innerHTML = disks.map(d => {
        const pct = d.used / d.size * 100;
        const color = pct > 95 ? 'var(--crit)' : pct > 85 ? 'var(--warn)' : 'var(--cpu)';
        return `<div class="vol"><div class="row"><b>${esc(d.mount)}</b><span class="free">${fmtBytes(d.size - d.used)} free</span></div>
          <div class="track"><div class="fill" style="width:${pct}%;background:${color}"></div></div></div>`;
      }).join('');
    };
    renderDisks(live.disks);
    onBus('disks', e => renderDisks(e.detail));
    every(4000, () => fetch('/api/processes').then(r => r.json()).then(d => {
      $('ov-procs').innerHTML = d.list.slice(0, 7).map(p =>
        `<tr><td><b>${esc(p.name)}</b><span class="pid">${p.pid}</span></td>
         <td class="num">${p.cpu.toFixed(1)}%</td><td class="num">${fmtBytes(p.memRss)}</td></tr>`).join('');
    }).catch(() => {}));
  },
};

pages.processes = {
  html: () => `
    ${chartPanel('p-chart', 'Top offenders — CPU', 220, 'tracked every 5s, last 30 minutes')}
    <div class="panel" style="margin-top:14px">
      <h2 style="margin-bottom:12px">All processes
        <span style="display:inline-flex;gap:12px;align-items:center;text-transform:none;letter-spacing:0">
          <input id="p-search" type="search" placeholder="Filter by name or PID…">
          <span class="aside" id="p-count"></span>
        </span>
      </h2>
      <table>
        <thead><tr>
          <th>Name</th>
          <th class="num sortable" data-sort="cpu">CPU % <span id="arr-cpu">▾</span></th>
          <th class="bar-cell"></th>
          <th class="num sortable" data-sort="mem">Memory <span id="arr-mem"></span></th>
          <th style="width:66px"></th>
        </tr></thead>
        <tbody id="p-body"></tbody>
      </table>
    </div>`,
  mount() {
    // fixed 8-slot palette, assigned per PID in first-seen order (color follows the process)
    const SLOTS = ['#3987e5', '#199e70', '#c98500', '#008300', '#9085e9', '#e66767', '#d55181', '#d95926'];
    const slotOf = new Map();
    const chart = regChart(new TimeChart($('p-chart'), {
      series: [], yFmt: v => v.toFixed(1) + '%', legendEl: $('p-chart-legend'),
    }));
    every(10000, () => fetch('/api/prochistory').then(r => r.json()).then(d => {
      for (const p of d.procs) if (!slotOf.has(p.pid)) slotOf.set(p.pid, slotOf.size % SLOTS.length);
      chart.o.series = d.procs.map(p => ({ key: 'p' + p.pid, label: `${p.name} ${p.pid}`, color: SLOTS[slotOf.get(p.pid)], fill: false }));
      // merge per-proc series onto a shared clock
      const allT = [...new Set(d.procs.flatMap(p => p.t))].sort((a, b) => a - b);
      const cols = { t: allT };
      for (const p of d.procs) {
        const m = new Map(p.t.map((t, i) => [t, p.cpu[i]]));
        cols['p' + p.pid] = allT.map(t => m.get(t) ?? null);
      }
      chart.setData(cols);
    }).catch(() => {}));

    let sortKey = 'cpu', procData = [], confirmPid = null, lastHtml = '', paused = false;
    const tbl = $('p-body').closest('.panel');
    tbl.addEventListener('mouseenter', () => { paused = true; });
    tbl.addEventListener('mouseleave', () => { paused = false; });
    document.querySelectorAll('th.sortable').forEach(th => th.addEventListener('click', () => {
      sortKey = th.dataset.sort;
      $('arr-cpu').textContent = sortKey === 'cpu' ? '▾' : '';
      $('arr-mem').textContent = sortKey === 'mem' ? '▾' : '';
      renderRows();
    }));
    $('p-search').addEventListener('input', renderRows);
    function renderRows() {
      const q = $('p-search').value.toLowerCase();
      const rows = procData
        .filter(p => !q || p.name.toLowerCase().includes(q) || String(p.pid).includes(q))
        .sort((a, b) => sortKey === 'cpu' ? b.cpu - a.cpu : b.memRss - a.memRss)
        .slice(0, 30);
      const html = rows.map(p => `
        <tr>
          <td><b>${esc(p.name)}</b><span class="pid">${p.pid}</span></td>
          <td class="num">${p.cpu.toFixed(1)}</td>
          <td class="bar-cell"><div class="mini-track"><div class="mini-fill" style="width:${Math.min(100, p.cpu)}%"></div></div></td>
          <td class="num">${fmtBytes(p.memRss)}</td>
          <td><button class="kill${confirmPid === p.pid ? ' confirm' : ''}" data-pid="${p.pid}">${confirmPid === p.pid ? 'sure?' : 'end'}</button></td>
        </tr>`).join('');
      if (html !== lastHtml) { $('p-body').innerHTML = html; lastHtml = html; }
    }
    $('p-body').addEventListener('click', async e => {
      const btn = e.target.closest('.kill');
      if (!btn) return;
      const pid = Number(btn.dataset.pid);
      if (confirmPid !== pid) {
        confirmPid = pid;
        renderRows();
        setTimeout(() => { if (confirmPid === pid) { confirmPid = null; renderRows(); } }, 8000);
        return;
      }
      confirmPid = null;
      const r = await fetch('/api/kill', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pid }) });
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        if (d.adminHint) offerElevation(`Could not end that process: ${esc(d.error)}`);
        else showToast(`<b>Could not end process</b><br>${esc(d.error || 'unknown error')}`);
      }
    });
    every(3500, () => { if (paused) return; fetch('/api/processes').then(r => r.json()).then(d => {
      procData = d.list;
      $('p-count').textContent = `${d.all} processes`;
      renderRows();
    }).catch(() => {}); });
  },
};

/* ---------- customizable dashboard ---------- */
const DASH_KEY = 'pulseDash-v1';
const DASH_DEFAULT = [
  { w: 'stat-cpu', size: 3 }, { w: 'stat-gpu', size: 3 }, { w: 'stat-mem', size: 3 }, { w: 'stat-health', size: 3 },
  { w: 'chart-system', size: 12 },
  { w: 'chart-gputemp', size: 6 }, { w: 'top-procs', size: 6 },
];
let dashEditing = false;
function dashLoad() {
  try {
    const d = JSON.parse(localStorage.getItem(DASH_KEY));
    if (Array.isArray(d) && d.length) return d;
  } catch {}
  return DASH_DEFAULT.map(x => ({ ...x }));
}
function dashSave(cfg) { localStorage.setItem(DASH_KEY, JSON.stringify(cfg)); }
function dashPin(sensorId, label) {
  const cfg = dashLoad();
  cfg.push({ w: 'sensor-stat', size: 3, sensor: sensorId, label });
  dashSave(cfg);
  showToast(`<b>${esc(label)}</b> pinned to the Dashboard.`);
}

const fmtSensor = (v, unit) => {
  if (v == null) return '—';
  if (unit === '°C') return v.toFixed(0) + '°C';
  if (unit === 'RPM') return v.toFixed(0) + ' RPM';
  if (unit === 'V') return v.toFixed(2) + ' V';
  if (unit === 'W') return v.toFixed(1) + ' W';
  if (unit === '%') return v.toFixed(0) + '%';
  return v.toFixed(1) + (unit ? ' ' + unit : '');
};

function statParts(el) {
  el.innerHTML = '<div class="stat"><div class="val">–</div><div class="sub"></div></div>';
  return { val: el.querySelector('.val'), sub: el.querySelector('.sub') };
}
function chartParts(el, height) {
  el.innerHTML = `<div class="legend" style="margin-bottom:8px"></div><div class="chart" style="height:${height}px"></div>`;
  return { legend: el.querySelector('.legend'), chart: el.querySelector('.chart') };
}

        <button class="hud-btn ghost" id="dash-reset">Reset layout</button>
      </div></div>`;
    const grid = `<div class="grid">` + cfg.map((c, i) => {
      const w = WIDGETS[c.w];
      if (!w) return '';
      const ctl = !dashEditing ? '' : `<span class="wctl">
        <button data-i="${i}" data-act="left" title="Move left">◀</button>
        <button data-i="${i}" data-act="size" title="Resize">⬍</button>
        <button data-i="${i}" data-act="right" title="Move right">▶</button>
        <button data-i="${i}" data-act="x" class="x" title="Remove">✕</button></span>`;
      return `<div class="panel span${c.size}"><h2>${esc(w.title(c))}${ctl}</h2><div id="wg-${i}"></div></div>`;
    }).join('') + `</div>`;
    return bar + addbar + grid;
  },
  mount() {
    const cfg = dashLoad();
    cfg.forEach((c, i) => {
      const w = WIDGETS[c.w], el = $('wg-' + i);
      if (w && el) w.mount(el, c);
    });
    $('dash-edit').addEventListener('click', () => { dashEditing = !dashEditing; renderPage(); });
    if (!dashEditing) return;

    $('page').addEventListener('click', e => {
      const b = e.target.closest('.wctl button');
      if (!b) return;
      const i = Number(b.dataset.i), c = dashLoad();
      if (b.dataset.act === 'x') c.splice(i, 1);
      if (b.dataset.act === 'size') c[i].size = c[i].size === 3 ? 6 : c[i].size === 6 ? 12 : 3;
      if (b.dataset.act === 'left' && i > 0) [c[i - 1], c[i]] = [c[i], c[i - 1]];
      if (b.dataset.act === 'right' && i < c.length - 1) [c[i + 1], c[i]] = [c[i], c[i + 1]];
      dashSave(c);
      renderPage();
    });
    $('dash-reset').addEventListener('click', () => { dashSave(DASH_DEFAULT.map(x => ({ ...x }))); renderPage(); });

    const typeSel = $('add-type'), snSel = $('add-sensor');
    const syncSensorSel = () => {
      const isSensor = WIDGETS[typeSel.value] && WIDGETS[typeSel.value].sensor;
      snSel.style.display = isSensor ? '' : 'none';
      if (isSensor) fetch('/api/sensors').then(r => r.json()).then(d => {
        if (!d.available) { snSel.innerHTML = '<option value="">no sensor source — see Sensors page</option>'; return; }
        const groups = {};
        for (const s of d.sensors) (groups[`${s.hw} · ${s.category}`] = groups[`${s.hw} · ${s.category}`] || []).push(s);
        snSel.innerHTML = Object.entries(groups).map(([g, list]) =>
          `<optgroup label="${esc(g)}">${list.map(s => `<option value="${esc(s.id)}">${esc(s.name)} (${fmtSensor(s.value, s.unit)})</option>`).join('')}</optgroup>`).join('');
      });
    };
    typeSel.addEventListener('change', syncSensorSel);
    syncSensorSel();
    $('add-go').addEventListener('click', () => {
      const type = typeSel.value, w = WIDGETS[type];
      const c = dashLoad();
      if (w.sensor) {
        if (!snSel.value) { showToast('Pick a sensor first — or set one up on the Sensors page.'); return; }
        c.push({ w: type, size: type === 'sensor-chart' ? 6 : 3, sensor: snSel.value, label: snSel.selectedOptions[0].textContent.replace(/ \(.*\)$/, '') });
      } else {
        c.push({ w: type, size: type.startsWith('stat-') ? 3 : 6 });
      }
      dashSave(c);
      renderPage();
    });
  },
};

/* ---------- sensors page ---------- */
pages.sensors = {
  html: () => `<div id="sn-root"><div class="note">Checking for a sensor source…</div></div>`,
  mount() {
    let built = false, lastIds = '';
    const root = $('sn-root');
    const render = d => {
      if (!d) return;
      if (!d.available) {
        built = false; lastIds = '';
        root.innerHTML = `<div class="panel" style="max-width:640px">
          <h2>Unlock every sensor on this machine</h2>
          <p class="note" style="font-size:12.5px;margin-bottom:4px">Windows doesn't expose CPU temperatures, fan RPMs, voltages or board temps
          without a sensor driver. The free, open-source <b style="color:var(--ink)">LibreHardwareMonitor</b> provides one — run it and
          this page (plus CPU temps everywhere in Pulse) lights up automatically.</p>
          <ol class="guide-steps">
            <li>Download LibreHardwareMonitor from the official <a href="https://github.com/LibreHardwareMonitor/LibreHardwareMonitor/releases/latest" target="_blank" rel="noopener">GitHub releases page</a> and unzip it.</li>
            <li>Run <b style="color:var(--ink)">LibreHardwareMonitor.exe</b> (let it install its driver if asked).</li>
            <li>In its menu bar turn on <b style="color:var(--ink)">Options → HTTP Server → Run</b> (keep the default port 8085).</li>
            <li>Done — Pulse checks every few seconds and this page fills in on its own. Keep LHM running in the tray.</li>
          </ol>
          <p class="note">Pulse only reads LHM's local data feed on this PC — nothing leaves your machine.</p>
        </div>`;
        return;
      }
      const ids = d.sensors.map(s => s.id).join(',');
      if (!built || ids !== lastIds) {
        built = true; lastIds = ids;
        const groups = new Map();
        for (const s of d.sensors) {
          const key = s.hw + '¦' + s.category;
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(s);
        }
        let html = `<div style="display:flex;gap:12px;align-items:center;margin-bottom:14px">
          <input id="sn-search" type="search" placeholder="Filter sensors…">
          <span class="note">${d.sensors.length} sensors · hover a tile to pin it to your Dashboard</span></div>`;
        let currentHw = '';
        for (const [key, list] of groups) {
          const [hw, cat] = key.split('¦');
          if (hw !== currentHw) { currentHw = hw; html += `<div class="panel" style="margin-bottom:4px;padding:9px 16px"><h2 style="margin:0">${esc(hw)}</h2></div>`; }
          html += `<div class="sn-cat note" style="margin-top:10px">${esc(cat)}</div><div class="sn-grid">` +
            list.map(s => `<div class="sn-tile" data-name="${esc((s.hw + ' ' + s.name).toLowerCase())}">
              <div class="sn-name" title="${esc(s.name)}">${esc(s.name)}</div>
              <b data-sid="${esc(s.id)}">${fmtSensor(s.value, s.unit)}</b>
              <button class="pin" data-id="${esc(s.id)}" data-label="${esc(s.name)}">+ pin</button></div>`).join('') + `</div>`;
        }
        root.innerHTML = html;
        $('sn-search').addEventListener('input', () => {
          const q = $('sn-search').value.toLowerCase();
          root.querySelectorAll('.sn-tile').forEach(t => { t.style.display = !q || t.dataset.name.includes(q) ? '' : 'none'; });
        });
        root.addEventListener('click', e => {
          const b = e.target.closest('.pin');
          if (b) dashPin(b.dataset.id, b.dataset.label);
        });
      } else {
        for (const s of d.sensors) {
          const el = root.querySelector(`[data-sid="${CSS.escape(s.id)}"]`);
          if (el) el.textContent = fmtSensor(s.value, s.unit);
        }
      }
    };
    if (live.sensors) render(live.sensors); else fetch('/api/sensors').then(r => r.json()).then(render);
    onBus('sensors', e => render(e.detail));
  },
};

renderPage();
</script>
</body>
</html>
